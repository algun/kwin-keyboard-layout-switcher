name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v1.0.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Package and publish
        env:
          TAG_NAME: ${{ steps.ref.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          META_VERSION="$(jq -r '.KPlugin.Version' metadata.json)"
          PLUGIN_ID="$(jq -r '.KPlugin.Id' metadata.json)"
          NAME="$(jq -r '.KPlugin.Name' metadata.json)"
          ARTIFACT="${PLUGIN_ID}-${VERSION}.kwinscript"

          if [ "$META_VERSION" != "$VERSION" ]; then
            echo "::error::metadata.json Version ($META_VERSION) must match tag ($VERSION)"
            exit 1
          fi

          chmod +x scripts/package.sh
          ./scripts/package.sh "$ARTIFACT"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$ARTIFACT" --clobber
          else
            gh release create "$TAG_NAME" "$ARTIFACT" \
              --title "${NAME} ${VERSION}" \
              --generate-notes \
              --notes "Install via System Settings → KWin Scripts → Install from File, or \`kpackagetool6 --type=KWin/Script --install ${ARTIFACT}\`"
          fi
